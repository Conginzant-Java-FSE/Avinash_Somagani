<section class="skills-section">
  <h2>Technical Skills</h2>

  <div class="skills-container">
    <div class="skill-category glass-card" *ngFor="let cat of skillCategories">
      <h3>{{cat.category}}</h3>

      <div class="skills-list">
        <div class="skill-item" *ngFor="let skill of cat.skills" appHighlightSkill>
          <div class="skill-info">
            <span class="skill-name">{{skill.name}}</span>
        
          </div>
         
        </div>
      </div>
    </div>
  </div>
</section>
